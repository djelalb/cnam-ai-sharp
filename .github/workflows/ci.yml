name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint and Format with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run Tests with Pytest
        env:
          # On mock la clé API pour que Pydantic ne plante pas lors des tests CI
          ULTRALYTICS_API_KEY: "dummy_key_for_ci_testing"
        run: |
          pytest tests/
