<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARP - Hand Detection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #video-container {
            position: relative;
            width: 640px;
            height: 480px;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        video {
            border-radius: 0.75rem;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-8">

    <!-- Header -->
    <header class="text-center mb-8">
        <h1 class="text-4xl font-black tracking-tighter text-blue-500 mb-2">SHARP</h1>
        <p class="text-slate-400 font-medium uppercase tracking-widest text-xs">Substantial Hand Analysis & Recognition Pipeline</p>
    </header>

    <!-- Main Content -->
    <main class="flex flex-col lg:flex-row gap-8 items-start justify-center w-full max-w-6xl">

        <!-- Camera Stream -->
        <div class="flex flex-col items-center">
            <div id="video-container" class="bg-black rounded-xl shadow-2xl border-4 border-slate-800 overflow-hidden">
                <video id="webcam" width="640" height="480" autoplay playsinline class="bg-black"></video>
                <canvas id="overlay" width="640" height="480"></canvas>
            </div>
            <div class="mt-4 flex gap-4">
                <div class="flex items-center gap-2">
                    <span id="status-dot" class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></span>
                    <span id="status-text" class="text-sm font-mono text-slate-400">Déconnecté</span>
                </div>
                <div class="text-sm font-mono text-slate-400">| FPS: <span id="fps-counter">0</span></div>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-700 min-w-[320px] flex-1 lg:max-w-md">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
                Dashboard Live
            </h2>

            <div class="space-y-6">
                <div>
                    <label class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-1 block">Total Doigts Détectés</label>
                    <div id="counter" class="text-8xl font-black text-blue-500 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]">0</div>
                </div>

                <div class="border-t border-slate-700 pt-6">
                    <label class="text-slate-500 text-xs font-bold uppercase tracking-wider mb-3 block">Détails des mains</label>
                    <div id="detections-list" class="space-y-2">
                        <p class="text-slate-500 italic text-sm italic">Aucune détection...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Hidden canvas for capturing frames -->
    <canvas id="hidden-canvas" width="640" height="480" class="hidden"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        const hiddenCanvas = document.getElementById('hidden-canvas');
        const hiddenCtx = hiddenCanvas.getContext('2d');
        const counterEl = document.getElementById('counter');
        const listEl = document.getElementById('detections-list');
        const fpsEl = document.getElementById('fps-counter');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        let socket = null;
        let lastFrameTime = Date.now();

        // 1. Accès Webcam
        async function setupWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480 },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Erreur Webcam:", err);
                statusText.innerText = "Erreur Camera";
            }
        }

        // 2. Connexion WebSocket
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/video`;

            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                statusDot.className = "w-3 h-3 bg-green-500 rounded-full";
                statusText.innerText = "Connecté";
                sendFrame();
            };

            socket.onclose = () => {
                statusDot.className = "w-3 h-3 bg-red-500 rounded-full animate-pulse";
                statusText.innerText = "Déconnecté";
                setTimeout(connect, 2000); // Reconnexion auto
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                drawBoxes(data.boxes);
                counterEl.innerText = data.total_fingers;
                updateList(data.boxes);

                // Calcul FPS
                const now = Date.now();
                fpsEl.innerText = Math.round(1000 / (now - lastFrameTime));
                lastFrameTime = now;

                // Envoyer la prochaine frame
                requestAnimationFrame(sendFrame);
            };
        }

        // 3. Capture et Envoi
        function sendFrame() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                hiddenCtx.drawImage(video, 0, 0, 640, 480);
                const base64Image = hiddenCanvas.toDataURL('image/jpeg', 0.6); // Compression JPEG 60%
                socket.send(base64Image);
            }
        }

        // 4. Dessin des Bounding Boxes
        function drawBoxes(boxes) {
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            ctx.lineWidth = 3;
            ctx.font = "16px monospace";

            boxes.forEach(box => {
                const [x1, y1, x2, y2] = box.bbox;
                const width = x2 - x1;
                const height = y2 - y1;

                // Rectangle
                ctx.strokeStyle = "#3b82f6";
                ctx.strokeRect(x1, y1, width, height);

                // Label Background
                ctx.fillStyle = "#3b82f6";
                const text = `${box.label} (${box.confidence})`;
                const textWidth = ctx.measureText(text).width;
                ctx.fillRect(x1, y1 - 25, textWidth + 10, 25);

                // Texte
                ctx.fillStyle = "white";
                ctx.fillText(text, x1 + 5, y1 - 7);
            });
        }

        function updateList(boxes) {
            if (boxes.length === 0) {
                listEl.innerHTML = '<p class="text-slate-500 italic text-sm italic">Aucune détection...</p>';
                return;
            }
            listEl.innerHTML = boxes.map(b => `
                <div class="flex justify-between bg-slate-700/50 p-2 rounded text-sm font-mono border-l-2 border-blue-500">
                    <span>${b.label}</span>
                    <span class="text-blue-400">${Math.round(b.confidence * 100)}%</span>
                </div>
            `).join('');
        }

        setupWebcam();
        connect();
    </script>
</body>
</html>
